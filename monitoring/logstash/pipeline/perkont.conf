# Logstash Pipeline — PerKont
# NestJS/Winston JSON loglarını alır, parse eder, Elasticsearch'e yazar

input {
  # NestJS/Winston TCP log gönderimi (Winston'da logstash transport ile)
  tcp {
    port => 5000
    codec => json_lines
  }

  # Filebeat entegrasyonu (log dosyalarından)
  beats {
    port => 5044
  }
}

filter {
  # JSON log parse
  if [message] {
    json {
      source => "message"
      target => "parsed"
      skip_on_invalid_json => true
    }
  }

  # Winston log alanlarını normalize et
  if [parsed][level] {
    mutate {
      add_field => {
        "log_level"   => "%{[parsed][level]}"
        "log_context" => "%{[parsed][context]}"
        "log_message" => "%{[parsed][message]}"
        "service"     => "perkont-api"
      }
    }
  }

  # Timestamp
  date {
    match => ["[parsed][timestamp]", "ISO8601"]
    target => "@timestamp"
  }

  # HTTP request logları
  if [parsed][req] {
    mutate {
      add_field => {
        "http_method"  => "%{[parsed][req][method]}"
        "http_url"     => "%{[parsed][req][url]}"
        "http_status"  => "%{[parsed][res][statusCode]}"
        "response_ms"  => "%{[parsed][responseTime]}"
      }
    }
  }

  # Güvenlik logları için alert tag
  if [parsed][action] in ["USER_LOGIN", "USER_LOGOUT", "MFA_ENABLED", "PASSWORD_RESET",
                           "INSPECTION_APPROVED", "REPORT_SIGNED"] {
    mutate { add_tag => ["security_event"] }
  }

  # Hata logları için alert tag
  if [log_level] == "error" {
    mutate { add_tag => ["error"] }
  }
}

output {
  elasticsearch {
    hosts     => ["http://elasticsearch:9200"]
    user      => "elastic"
    password  => "${ELASTIC_PASSWORD}"
    index     => "perkont-logs-%{+YYYY.MM.dd}"

    # Index template ile retention politikası
    template_name => "perkont-logs"
    template_overwrite => true
  }

  # Debug: stdout'a da yaz (production'da kapat)
  # stdout { codec => rubydebug }
}
