global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'perkont-monitor'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  # PerKont API custom metrics
  - job_name: 'perkont-api'
    metrics_path: '/api/v1/metrics'
    static_configs:
      - targets: ['api:3000']
    scrape_interval: 30s

  # Node Exporter (sistem metrikleri)
  - job_name: 'node'
    static_configs:
      - targets: ['node_exporter:9100']

  # MySQL
  - job_name: 'mysql'
    static_configs:
      - targets: ['mysqld_exporter:9104']

  # Redis
  - job_name: 'redis'
    static_configs:
      - targets: ['redis_exporter:9121']

  # Prometheus kendi kendini izlesin
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
