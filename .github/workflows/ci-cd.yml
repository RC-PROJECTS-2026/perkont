name: PerKont CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ${{ github.repository }}/backend
  FRONTEND_IMAGE: ${{ github.repository }}/frontend

jobs:
  # ─── Backend Tests ─────────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_password
          MYSQL_DATABASE: perkont_test
        ports: ['3306:3306']
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u root -proot_password"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test -- --coverage --passWithNoTests
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 3306
          DB_USERNAME: test_user
          DB_PASSWORD: test_password
          DB_DATABASE: perkont_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: test-jwt-secret-min-32-characters-long
          JWT_REFRESH_SECRET: test-refresh-secret-min-32-chars
          ENCRYPTION_KEY: test-encryption-key-32-chars-xxxx

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          directory: backend/coverage
          flags: backend

  # ─── Frontend Tests ─────────────────────────────────────────────────────────
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build check
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000/api/v1

  # ─── Playwright E2E Tests (Bölüm 14) ───────────────────────────────────────
  e2e-test:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    # E2E sadece main/develop branch'te çalışır
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_USER: perkont
          MYSQL_PASSWORD: perkont_pass
          MYSQL_DATABASE: perkont_e2e
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u root -proot_password"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install backend deps
        run: npm ci
        working-directory: backend

      - name: Run backend migrations
        run: npm run migration:run
        working-directory: backend
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 3306
          DB_USERNAME: perkont
          DB_PASSWORD: perkont_pass
          DB_DATABASE: perkont_e2e
          REDIS_HOST: localhost
          JWT_SECRET: e2e-test-jwt-secret-min-32-characters
          JWT_REFRESH_SECRET: e2e-test-refresh-secret-min-32-chars
          ENCRYPTION_KEY: e2e-test-encryption-key-32-chars-xx

      - name: Start backend
        run: npm run start:prod &
        working-directory: backend
        env:
          NODE_ENV: test
          PORT: 3000
          DB_HOST: localhost
          DB_PORT: 3306
          DB_USERNAME: perkont
          DB_PASSWORD: perkont_pass
          DB_DATABASE: perkont_e2e
          REDIS_HOST: localhost
          JWT_SECRET: e2e-test-jwt-secret-min-32-characters
          JWT_REFRESH_SECRET: e2e-test-refresh-secret-min-32-chars
          ENCRYPTION_KEY: e2e-test-encryption-key-32-chars-xx
          ESIGN_PROVIDER: mock

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000/api/v1

      - name: Wait for backend
        run: |
          timeout 60 bash -c 'until curl -s http://localhost:3000/api/v1/health > /dev/null; do sleep 2; done'

      - name: Run Playwright E2E tests
        run: npm run test:e2e
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3001
          TEST_ADMIN_EMAIL: admin@e2e.test
          TEST_ADMIN_PASSWORD: E2ETest123!
          TEST_INSPECTOR_EMAIL: inspector@e2e.test
          TEST_INSPECTOR_PASSWORD: E2ETest123!

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

  # ─── Build & Push Docker Images ────────────────────────────────────────────
  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    needs: backend-test
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    needs: frontend-test
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}

  # ─── Deploy to Production ──────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/perkont

            # Pull latest images
            docker pull ghcr.io/${{ github.repository }}/backend:latest
            docker pull ghcr.io/${{ github.repository }}/frontend:latest

            # Run MySQL migrations
            docker run --rm \
              --env-file .env \
              --network perkont_perkont-net \
              ghcr.io/${{ github.repository }}/backend:latest \
              node dist/main migration:run

            # Rolling restart (zero-downtime)
            docker compose up -d --no-deps --scale api=2 api
            sleep 15
            docker compose up -d --no-deps --scale api=1 api
            docker compose up -d --no-deps frontend nginx

            # Health check
            sleep 5
            curl -f https://api.perkont.com/api/v1/health/ping || exit 1

            echo "Deployment successful"

      - name: Notify on success
        if: success()
        run: echo "Deployment completed successfully"

      - name: Notify on failure
        if: failure()
        run: echo "Deployment FAILED"
